<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cogs.tech</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
            background-color: #0a0a0a;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 640px;
            width: 100%;
        }

        .header {
            margin-bottom: 3rem;
        }

        .logo-img {
            height: 60px;
            width: auto;
            margin-bottom: 0.75rem;
        }

        .tagline {
            color: #737373;
            font-size: 0.9rem;
            font-weight: 400;
        }

        .projects {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .project-card {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            padding: 1.25rem 1.5rem;
            background-color: #171717;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            text-decoration: none;
            color: #f5f5f5;
            transition: all 0.2s ease;
        }

        .project-card:hover {
            border-color: #369b5a;
            background-color: #1a1a1a;
            transform: translateY(-1px);
        }

        .project-icon {
            font-size: 1.5rem;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1f1f1f;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .project-info {
            flex: 1;
        }

        .project-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .project-desc {
            font-size: 0.8rem;
            color: #737373;
            font-weight: 400;
        }

        .project-arrow {
            color: #525252;
            font-size: 1.25rem;
            transition: color 0.2s ease;
        }

        .project-card:hover .project-arrow {
            color: #369b5a;
        }

        .footer {
            margin-top: 3rem;
            color: #404040;
            font-size: 0.75rem;
            text-align: center;
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 2rem;
            }

            .project-card {
                padding: 1rem 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="assets/logo-light.svg" alt="cogs.tech" class="logo-img">
            <div class="tagline">projects by chris cogbill</div>
        </div>

        <div class="projects">
            <a href="https://chris.cogs.tech" class="project-card">
                <div class="project-icon">&#128196;</div>
                <div class="project-info">
                    <div class="project-name">Chris's CV</div>
                    <div class="project-desc">chris.cogs.tech</div>
                </div>
                <div class="project-arrow">&#8594;</div>
            </a>

            <a href="https://fantasynfl.cogs.tech" class="project-card">
                <div class="project-icon">&#127944;</div>
                <div class="project-info">
                    <div class="project-name">Fantasy NFL</div>
                    <div class="project-desc">fantasynfl.cogs.tech</div>
                </div>
                <div class="project-arrow">&#8594;</div>
            </a>
        </div>

        <div class="footer">
            &copy; 2026 cogs.tech
        </div>
    </div>
</body>
</html>
